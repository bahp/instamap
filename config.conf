{
    "extractor": {
        "instagram": {
            "api": "rest",
            "cookies": ["chrome"],
            "include": "posts",
            "order-files": "asc",
            "order-posts": "asc",
            "previews": false,
            "sleep-request": [6.0, 12.0],
            "videos": false,
            "metadata": true
        },

        "postprocessors": [
            {
                "name": "metadata",
                "mode": "tags"
            }
        ]
    }
}