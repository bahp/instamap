<html>
<head>

  <!-- Bootstrap -->
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css"
        rel="stylesheet"
        integrity="sha384-T3c6CoIi6uLrA9TneNEoa7RxnatzjcDSCmG1MXxSR1GAsXEV/Dwwykc2MPK8M2HN"
        crossorigin="anonymous">

  <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/js/bootstrap.bundle.min.js"
          integrity="sha384-C6RzsynM9kWDrMNeT87bh95OGNyZPhcTNXj1NW7RuBCsyN/o0jlpcV8Qyq46cDfL"
          crossorigin="anonymous">
  </script>

  <!-- JQuery -->
  <script src="https://ajax.googleapis.com/ajax/libs/jquery/3.3.1/jquery.min.js"></script>

  <!-- Instagram embed -->
  <script async src="https://www.instagram.com/embed.js"></script>
</head>
<body>

<div class="container m-5">

  <div class="row">

    <!-- Dropdown -->
    <div class="">
      <div class="form-floating mb-1">
        <select id='selector' class="form-select form-select-sm custom-select">
          <option value=default> --</option>
          <option value=Cwvc-D3sHF1> Cwvc-D3sHF1</option>
          <option value=CyGDGR3sv7z> CyGDGR3sv7z</option>
          <option value=CymAX_8qiEu> CymAX_8qiEu</option>
        </select>
        <label for="selector">Choose one of the shortcodes</label>
      </div>
    </div>

    <!-- Free text -->
    <div class="input-group mt-2 mb-1">
      <input id='shortcode'
             type="text" class="form-control rounded-left"
             name="Shortcode"
             placeholder="Shortcode..."
             aria-label="Shorcode..."
             aria-describedby="basic-addon2">
      <input type="submit" id='submit' class="btn btn-outline-secondary">
    </div>

  </div>

  <div class="row">
    <div id="post"></div>
  </div>

</div>
</body>

<script>

    function htmlEmbed(shortcode) {
        var template = `
              <blockquote class="instagram-media" data-instgrm-captioned
              data-instgrm-permalink="https://www.instagram.com/p/` + shortcode + `/?utm_source=ig_embed&amp;utm_campaign=loading"
              data-instgrm-version="14"></blockquote>
          `
        return template
    }

    // Set embedded post
    function setEmbed(shortcode) {
        $('#post').html(htmlEmbed(shortcode))
        window.instgrm.Embeds.process()
    }

    // Using input text
    $('#submit').on('click', function (e) {
        setEmbed($('#shortcode').val())
    });

    // Using dropdown list
    $('#selector').on('change', function (e) {
        setEmbed(e.target.value)
    })

</script>
</html>
