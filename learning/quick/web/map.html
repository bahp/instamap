<script>

    ATTRDICT = {
        FLAIR: {
            title: 'text',
            shortcode: 'shortcode',
            subtitle: 'display_name',
            type: 'type',
            latitude: 'lat',
            longitude: 'lon'
        },
        BARD: {
            title: 'name',
            shortcode: 'shortcode',
            subtitle: 'display_name',
            latitude: 'lat',
            longitude: 'lon',
            type: 'type'
        }
    }


    ATTR = ATTRDICT.BARD

    function get(obj, attr, mapping) {
        return obj[mapping[attr]] ?? '-'
    }


    // -------------------------------------
    // Helper functions
    // -------------------------------------
    String.prototype.format = function () {
        // store arguments in an array
        var args = arguments;
        // use replace to iterate over the string
        // select the match and check if related argument is present
        // if yes, replace the match with the argument
        return this.replace(/{([0-9]+)}/g, function (match, index) {
            // check if the argument is present
            return typeof args[index] == 'undefined' ? match : args[index];
        });
    };

    String.prototype.title = function () {
        return this.replace(/(?:^|\s)\w/g, function (match) {
            return match.toUpperCase();
        });
    }

    function objectToString(obj, fmt) {
        let result = '';
        for (let key in obj) {
            if (obj.hasOwnProperty(key)) {
                result += fmt.format(key, obj[key]);
            }
        }
        return result;
    }

    function isFloat(n){
      return Number(n) === n && n % 1 !== 0;
    }

    // -------------------------------------
    // Templates
    // -------------------------------------

    /* .. note: Could this be done in a better way using some kind of
                templates from either HTML or external libraries such
                as jQuery?
     */


    var template_embed = `
     <blockquote class="instagram-media"
         data-instgrm-captioned
         data-instgrm-permalink="https://www.instagram.com/p/{0}/?utm_source=ig_embed&amp;utm_campaign=loading"
         data-instgrm-version="14" style="width:100%;">
     </blockquote>
  `

    var template_popup = `

    <div class="card mb-3 w" style="max-width: 540px;">
      <div class="row no-gutters">
        <!--
        <div class="col-md-4">
          <img src="..." class="card-img" alt="...">
        </div>
        -->
        <div class="col-md-12">
          <div class="card-body position-relative">

            <a class="text-right position-absolute top-0 end-0 p-2"
               href="https://www.google.com/maps/place/{0}"
               target="_blank">
               <img src="https://www.google.com/images/branding/product/ico/maps15_bnuw3a_32dp.ico" height="22">
            </a>

            <h5 class="card-title lh-sm mb-0">{0}</h5>
            <a href="https://www.instagram.com/p/{1}/?img_index=1"
               class="small text-decoration-none"
               target="_blank">{1}
             </a>

            <p class="card-text">{2}</p>
            <!--<p class="card-text"><small class="text-muted">Last updated 3 mins ago</small></p>-->
            <div class="small text-body text-opacity-50">
             Location: {3} <br>
             Confidence: {4} <br>
             Coordinates: ({5}, {6})
              <a href="https://www.google.com/maps/place/{4},{5}"
                 class="small text-decoration-none"
                 target="_blank"><i class="bi bi-geo-fill"></i>
               </a><br>
             Class: {7} <br>
             Type: {8} <br>
             Rank: {9} <br>

            <a class="float-end"
               data-bs-toggle="collapse"
               data-bs-target="#collapseExample"
               role="button"
               aria-expanded="false"
               aria-controls="collapseExample">
              See more
            </a><br>

             <div class="collapse" id="collapseExample"> <hr> {10} </div>

            </div>
          </div>
        </div>
      </div>
    </div>
  `

    function get_popup_html(entry) {
        /**
         * Get the popup HTML content.
         * \*entry.confidence.toFixed(3) || undefined,
         */
        return template_popup.format(
            get(entry, 'title', ATTR).title(),
            get(entry, 'shortcode', ATTR),
            get(entry, 'subtitle', ATTR),
            entry.text,
            '--',
            entry.lat.toFixed(3),
            entry.lon.toFixed(3),
            entry.class,
            entry.type_y,
            entry.place_rank,
            objectToString(entry, '{0}: {1}<br>')
        )
    }

    // -----------------------------
    // Customizing markers
    // -----------------------------
    // Div marker with fontawesome
    const fontAwesomeIcon = L.divIcon({
        html: '<i class="fa fa-map-marker fa-4x"></i>',
        iconSize: [20, 20],
        className: 'myDivIcon'
    });

    const houseIcon = L.divIcon({
        html: '<div style="background-color:#c30b82;" class="marker-pin"><i class="bi bi-house"></i></div>',
        iconSize: [20, 20],
        className: 'leaflet-marker-icon'
    });

    // Div marker with own css
    const pin = L.divIcon({
        html: '<div class="pin1"></div>',
        iconSize: [20, 20],
        className: 'leaflet-marker-icon'
    });

    // Using an external library.
    var glyph = L.icon.glyph({
        prefix: 'fas', glyph: 'globe', // glyphColor: 'brown'
    });


    function get_beautify_icon(entry) {
        /**
         * Creates the arguments for beautify
         *
         * Ref: https://github.com/masajid390/BeautifyMarker
         **/

        // Merge information giving priority to <type>.
        d = {
            ...MARKER_STYLE[entry.class],
            ...MARKER_STYLE[entry.type]
        }

        // Set missing values
        d.backgroundColor = d.backgroundColor || 'blue'
        d.borderColor = LightenDarkenColor(d.backgroundColor, -80)
        d.textColor = d.textColor || 'white'

        // Return icon
        return L.BeautifyIcon.icon({
            icon: d.icon || '',
            //iconSize: L.point(22, 22), // circle: (22, 22), marker (28, 28)
            //iconShape: 'circle', // marker, circle
            //iconAnchor: L.point(11, 6),  // 11,6
            //innerIconAnchor: L.point(0, 4), // 0,3
            iconShape: 'marker',
            borderWidth: 1,
            borderStyle: 'solid',
            borderColor: d.borderColor,
            backgroundColor: d.backgroundColor,
            textColor: d.textColor,
            spin: false
        })
    }

    function get_icon(i, d) {
        /**
         * This class choses the type of icon to use
         **/
        if (i == 1)
            return fontAwesomeIcon
        else if (i == 2)
            return houseIcon
        else if (i == 3)
            return pin
        else if (i == 4)
            return glyph
        else if (i == 5)
            return get_beautify_icon(d)
        else
            return {}
    }


    // --------------------------------------------------
    // Main
    // --------------------------------------------------
    // Constants
    attribution_osm = '&copy; <a href="http://www.openstreetmap.org/copyright">OpenStreetMap</a>'
    attribution_gmp = '&copy; <a href="http://www.googlemaps.com/copyright">GoogleMaps</a>'


    // Create map
    var map = L.map('map').setView([51.505, -0.09], 6);

    // Add tile layer (need to give attribution)
    L.tileLayer('https://tile.openstreetmap.org/{z}/{x}/{y}.png', {
        //maxZoom: 6,
        attribution: attribution_osm
    }).addTo(map);

    var marker = L.marker([51.5, -0.09]).addTo(map);
    marker.bindPopup("<b>Hello world!</b><br>I am a popup.").openPopup();
    var popup = L.popup()
      .setLatLng([51.513, -0.09])
      .setContent("I am a standalone popup.")
      .openOn(map);

    // Show latitude and longitude on click.
    var popup = L.popup();
    function onMapClick(e) {
        popup
            .setLatLng(e.latlng)
            .setContent("You clicked the map at " + e.latlng.toString())
            .openOn(map);
    }
    map.on('click', onMapClick);
    */

    // Show loaded data
    console.log("Data:", data)

    var template_legend = `
        <div class="input-group mb-1 input-group-sm d-flex">
          <div class="input-group-text flex-0">
            <input class="form-check-input mt-0" type="checkbox" value="" aria-label="" checked>
          </div>
          <input type="text" class="form-control form-control-sm w-75"
                 aria-label="Text input with checkbox" placeholder="{0}">
          <input type="color" id="unicolor"
             class="form-control form-control-color form-control-sm"
             name="head" value="{1}">
        </div>`

    function populateLegend() {

      // Group by color
      // Show only those in data

      // Group by type
      const result = Object.groupBy(data, ({ type }) => type);

      // Logging
      console.log("Legend...", result)

      // Display legend
      Object.entries(result).forEach(([key, value]) => {
        var d = MARKER_STYLE[key] || {}
        var c = d.backgroundColor || '#D3D3D3'
        var tmp = template_legend.format(key,  c)
        $('#legend-markers').append(tmp)
      });


        /*
      // Using array methods
      Object.entries(MARKER_STYLE).forEach(([key, value]) => {
          console.log(template_legend)
          $('#legend-markers').append(template_legend.format(
              key, value.backgroundColor || '#D3D3D3'
          ))
        //console.log(`${key} ${value}`); // "a 5", "b 7", "c 9"
      });
      */
    }

    // A $( document ).ready() block.
    $(document).ready(function () {

        // Get unique post short codes
        let shortcodes = data.reduce(function (acc, curr) {
          if (!acc.includes(curr.shortcode))
              acc.push(curr.shortcode);
          return acc;
        }, []);

        // Include information
        $('#info').html("Rows: {0} | Posts: {1}".format(
            data.length, shortcodes.length))

        $.each(data, function (index, value) {

            // Show information of each post.
            //console.log(index, value)

            /*
            Possible options for the icons:
             {
                  draggable: true,
                  title: "",
                  opacity: 0.75
              }
            */

            // Get latitude and longitude
            var latitude = get(value, 'latitude', ATTR)
            var longitude = get(value, 'latitude', ATTR)
            if (!(isFloat(latitude)) || !(isFloat(longitude)))
                return

            // Set icon information
            value.icon = get_icon(5, value)

            // Add marker to map
            var marker = L.marker([
                get(value, 'latitude', ATTR),
                get(value, 'longitude', ATTR),
            ], value).addTo(map);

            // Add popup
            marker.bindPopup(get_popup_html(value))

            // On click
            marker.on('click', function (e) {
                var tmp = template_embed.format(e.target.options.shortcode)
                $('#post-embed').html(tmp)
                window.instgrm.Embeds.process()
            })
        })


        //
        populateLegend()
    });
